<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>ZNIB | ACCESS GATE</title>
    <style>
        /* 背景を深いネイビーに変更 */
        body { 
            background-color: #0a192f; 
            color: #00d4ff; 
            font-family: "Courier New", Courier, monospace; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }

        /* 画面全体のノイズ・走査線演出 */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(10, 25, 47, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(0, 212, 255, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 212, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* エンブレムを中央に */
        .emblem-container {
            text-align: center;
            margin-bottom: 30px;
            animation: pulse 4s infinite ease-in-out;
        }
        .emblem {
            width: 200px; /* あずささんのエンブレムに合わせて調整 */
            height: auto;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.4));
        }

        /* ステータステキスト */
        .status-text {
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 0.15em;
        }
        .status-text p {
            font-size: 13px;
            color: #a8b2d1; /* ネイビーに馴染むシルバーブルー */
            margin: 8px 0;
        }
        .warning {
            color: #ff4d4d; /* 警告は目立つ赤 */
            font-weight: bold;
            margin-top: 20px !important;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }

        /* ハイテク・アクセスボタン */
        .access-button {
            background: rgba(0, 212, 255, 0.05);
            color: #00d4ff;
            border: 1px solid #00d4ff;
            padding: 18px 50px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
            position: relative;
            z-index: 20;
            letter-spacing: 0.2em;
        }
        .access-button:hover {
            background: #00d4ff;
            color: #0a192f;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
            transform: translateY(-2px);
        }

        /* 鼓動するアニメーション */
        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }
            100% { opacity: 0.7; transform: scale(1); }
        }

        @media (max-width: 600px) {
            .emblem { width: 160px; }
            .status-text { padding: 0 25px; }
            .access-button { padding: 15px 35px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="emblem-container">
        <img src="logo.png" alt="ZNIB EMBLEM" class="emblem">
    </div>

    <div class="status-text">
        <p>ZNIB CENTRAL DATABASE v3.8</p>
        <p>IDENTIFYING AGENT... [AUTHORIZED]</p>
        <p class="warning">真実を知る準備はできているか？</p>
    </div>

    <a href="report.html" class="access-button">
        最終報告書を開示する
    </a>

    <div style="margin-top: 60px; font-size: 10px; color: #465a7a; letter-spacing: 0.1em;">
        SECURED BY ZALVIAN NATIONAL INVESTIGATION BUREAU
    </div>

</body>
</html>
