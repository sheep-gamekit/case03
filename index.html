<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>CASE:03 FINAL REPORT</title>
    <style>
        body {
            background-color: #e0e0e0; /* 薄いグレーの背景 */
            color: #333;
            font-family: "Hiragino Mincho ProN", "MS PMincho", serif; /* 報告書らしく明朝体系 */
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .report-container {
            background-color: #ffffff; /* 報告書本体は白 */
            width: 100%;
            max-width: 800px;
            padding: 50px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            box-sizing: border-box;
            border: 1px solid #ccc;
        }

        /* ロゴとタイトル部分のレイアウト */
        .header-section {
            display: flex;
            align-items: flex-start;
            margin-bottom: 40px;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
        }

        .logo {
            width: 120px; /* ロゴのサイズ調整 */
            height: auto;
            margin-right: 20px;
        }

        .header-text {
            flex: 1;
        }

        .agency-name {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-bottom: 5px;
        }

        .report-title {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0 5px 0;
        }

        .case-info {
            font-family: monospace;
            font-size: 14px;
            background: #f9f9f9;
            padding: 15px;
            border: 1px solid #eee;
            margin-bottom: 30px;
        }

        h2 {
            font-size: 18px;
            border-left: 5px solid #333;
            padding-left: 10px;
            margin-top: 30px;
            background: #f4f4f4;
        }

        .highlight-red {
            color: #d93025;
            font-weight: bold;
        }

        .signature {
            margin-top: 50px;
            text-align: right;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .footer-note {
            font-size: 12px;
            color: #888;
            margin-top: 40px;
            text-align: center;
        }

        /* 導線解説セクション（少し雰囲気を変える） */
        .walkthrough {
            margin-top: 60px;
            padding: 30px;
            background-color: #f0f0f0;
            border-radius: 8px;
        }
