<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex"> <title>CASE:03 ANSWER KEY</title>
    <style>
        body {
            /* あずささんのアンバー背景をイメージしたグラデーション */
            background: radial-gradient(circle, #c47000 0%, #8a4b00 100%);
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        h1 {
            font-size: 24px; /* 14ptより少し大きく、スマホで見やすく */
            letter-spacing: 0.2em;
            margin-bottom: 20px;
        }
        p {
            font-size: 16px; /* 10pt相当の読みやすさ */
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .answer-content {
            font-size: 20px;
            font-weight: bold;
            background: white;
            color: #8a4b00;
            padding: 15px 30px;
            border-radius: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ANSWER KEY</h1>
        <p>事件の真相へ到達しました。<br>解答を確認してください。</p>
        
        <div class="answer-content">
            正解は「〇〇〇〇」です
        </div>
    </div>
</body>
</html>
